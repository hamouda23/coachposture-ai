name: CoachPosture AI — CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.12"

jobs:

  # ── Tests unitaires ─────────────────────────────────────────────────────
  test:
    name: Tests unitaires (CPU)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Installer les dépendances système (OpenCV/MediaPipe)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libgl1-mesa-glx libglib2.0-0 libsm6 libxext6 libxrender-dev libgomp1

      - name: Installer les dépendances Python
        run: |
          pip install --upgrade pip
          # PyTorch CPU pour CI (pas de GPU sur GitHub Actions)
          pip install torch==2.3.1 torchvision==0.18.1 --index-url https://download.pytorch.org/whl/cpu
          pip install -r requirements.txt --no-deps --ignore-requires-python || true
          pip install mediapipe opencv-python scikit-learn pandas numpy scipy \
                      pytest pytest-cov loguru pydantic httpx

      - name: Vérification syntaxe Python
        run: |
          python -m py_compile src/data/label_postures.py
          python -m py_compile src/data/extract_keypoints.py
          python -m py_compile src/models/train.py
          python -m py_compile src/models/evaluate.py
          python -m py_compile src/models/inference.py
          python -m py_compile src/agent/posture_agent.py
          echo "Syntaxe OK"

      - name: Exécuter les tests avec couverture
        env:
          PYTHONPATH: .
        run: |
          pytest tests/ -v \
            --cov=src \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --tb=short \
            -x

      - name: Upload couverture vers Codecov
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: coverage.xml
          fail_ci_if_error: false

  # ── Lint & qualité ──────────────────────────────────────────────────────
  lint:
    name: Lint & type check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Installer outils qualité
        run: pip install ruff mypy

      - name: Ruff (linter rapide)
        run: ruff check src/ tests/ --ignore E501,E402

      - name: Vérification types (mypy)
        run: |
          mypy src/data/label_postures.py \
               src/agent/posture_agent.py \
               --ignore-missing-imports \
               --no-strict-optional \
               --allow-untyped-defs
        continue-on-error: true  # Non-bloquant en première phase

  # ── Build Docker ─────────────────────────────────────────────────────────
  docker-build:
    name: Build image Docker
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (sans push)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: coachposture-ai:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Pipeline données (smoke test) ────────────────────────────────────────
  data-pipeline-smoke:
    name: Smoke test pipeline données
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Installer dépendances minimales
        run: |
          sudo apt-get install -y --no-install-recommends \
            libgl1-mesa-glx libglib2.0-0 libgomp1
          pip install mediapipe opencv-python pandas numpy loguru Pillow tqdm requests

      - name: Test génération données synthétiques
        env:
          PYTHONPATH: .
        run: |
          python src/data/download_datasets.py --synthetic-only
          ls data/raw/synthetic_lsp/

      - name: Test extraction keypoints (données synthétiques)
        env:
          PYTHONPATH: .
        run: |
          python src/data/extract_keypoints.py --dataset synthetic_lsp
          ls data/processed/

      - name: Test labellisation
        env:
          PYTHONPATH: .
        run: |
          python src/data/label_postures.py
          ls data/labeled/
          ls results/
